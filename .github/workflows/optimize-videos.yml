name: Optimize blob videos

on:
  # Botón manual en la pestaña Actions
  workflow_dispatch:
  # Se ejecuta solo cuando cambia el script o este workflow
  push:
    branches:
      - claude/resume-lady-jarana-JP1L9
    paths:
      - .github/workflows/optimize-videos.yml
      - scripts/optimize-videos.mjs

# Evita el aviso de deprecación de Node 20 en las actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Verify ffmpeg
        run: ffmpeg -version | head -1

      - name: Transcode and re-upload
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.LADYJARANA_READ_WRITE_TOKEN }}
        run: node scripts/optimize-videos.mjs
