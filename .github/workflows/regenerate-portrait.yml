name: Regenerate member portrait

on:
  workflow_dispatch:
    inputs:
      member:
        description: 'Miembro a regenerar'
        required: true
        type: choice
        options:
          - victor
          - alejo
          - ivan
          - diego
          - antonio
      version:
        description: 'Número de versión nueva (ej. 3)'
        required: true
        type: string
        default: '3'

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Generate portrait via fal.ai
        env:
          FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
        run: node scripts/regenerate-portrait.mjs ${{ inputs.member }} ${{ inputs.version }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/integrantes/${{ inputs.member }}-v${{ inputs.version }}.png src/lib/integrantes.ts
          git commit -m "regen: ${{ inputs.member }} portrait v${{ inputs.version }}"
          git push
